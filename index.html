<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sukh Healthcare | Classical Wellness Boutique</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Playfair Display (Classical Luxury) & Lato (Clean Modern) -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           CLASSICAL LUXURY E-COMMERCE THEME
           "Pyari & Attractive" Boutique Design
           ========================================= */
        :root {
            --color-bg-base: #FDFBF7;    /* Warm, soft alabaster cream */
            --color-brand: #1E3B2D;      /* Deep, classical forest/heritage green */
            --color-gold: #D4AF37;       /* Elegant, soft metallic gold */
            --color-premium-gold: #C5A059; /* Rich luxury gold for text */
            --color-text: #2C3531;       /* Soft charcoal for readability */
            --color-glass: rgba(255, 255, 255, 0.85);
        }

        /* Base font-size setup. 
          By default browsers use 16px. We will shrink this for mobile
          so that ALL rem-based sizing scales down perfectly.
        */
        html {
            font-size: 16px; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--color-bg-base);
            font-family: 'Lato', sans-serif;
            overflow: hidden;
            position: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.9s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- Dreamy, Attractive Ambient Background --- */
        .dream-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: floatOrb 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 50vw; height: 50vw;
            background: #E8F0E8; 
            top: -10%; left: -10%;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 40vw; height: 40vw;
            background: #FDF5E6; 
            bottom: -5%; right: -5%;
            animation-delay: -5s;
            animation-duration: 22s;
        }
        
        .orb-3 {
            width: 30vw; height: 30vw;
            background: #EAF0EE; 
            top: 40%; left: 60%;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* --- Classical Glassmorphism Boutique Card --- */
        .boutique-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 28.75rem; /* ~460px */
            background: var(--color-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 2.25rem; /* ~36px */
            padding: 3.5rem 3rem;
            box-shadow: 0 40px 80px -20px rgba(30, 59, 45, 0.12),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transform: translateY(1.25rem) scale(0.98);
            opacity: 0;
            animation: elegantReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes elegantReveal {
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* --- Brand Emblem --- */
        .brand-emblem {
            width: 4rem; /* 64px */
            height: 4rem;
            margin-bottom: 1.5rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-emblem i {
            font-size: 2.2rem;
            color: var(--color-brand);
            z-index: 2;
        }

        .emblem-ring {
            position: absolute;
            inset: -0.5rem; /* -8px */
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.4);
            animation: slowSpin 15s linear infinite;
        }

        .emblem-ring::before {
            content: '';
            position: absolute;
            top: -0.1875rem; /* -3px */
            left: 50%;
            transform: translateX(-50%);
            width: 0.375rem; /* 6px */
            height: 0.375rem;
            background: var(--color-gold);
            border-radius: 50%;
        }

        @keyframes slowSpin { 100% { transform: rotate(360deg); } }

        /* --- Classical Typography --- */
        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 600;
            color: var(--color-brand);
            line-height: 1.1;
            margin-bottom: 0.25rem;
            letter-spacing: 0.02em;
        }

        .brand-subtitle {
            font-family: 'Lato', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--color-gold);
            margin-bottom: 3.5rem;
            position: relative;
            display: inline-block;
        }

        .brand-subtitle::after {
            content: '';
            position: absolute;
            bottom: -0.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 1.5rem;
            height: 1px;
            background: var(--color-gold);
            opacity: 0.6;
        }

        /* --- Cinematic Loading Experience --- */
        .loading-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            margin-bottom: 3.5rem;
        }

        .status-text {
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--color-premium-gold);
            margin-bottom: 1.2rem;
            height: 1.2rem;
            opacity: 1;
            will-change: opacity;
        }

        .progress-line-container {
            width: 100%;
            height: 2px;
            background: rgba(30, 59, 45, 0.08);
            position: relative;
            border-radius: 2px;
        }

        .progress-line {
            position: absolute;
            top: 0; left: 0; height: 100%;
            background: linear-gradient(90deg, transparent, var(--color-premium-gold), transparent);
            background-size: 200% 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px rgba(197, 160, 89, 0.6);
            animation: shimmerLoad 2s infinite linear;
        }

        @keyframes shimmerLoad {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        /* --- Classical E-commerce Stamps (Badges) --- */
        .trust-stamps {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            width: 100%;
            opacity: 0.85;
        }

        .stamp {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.625rem;
        }

        .stamp-icon {
            width: 2.25rem; /* 36px */
            height: 2.25rem;
            border-radius: 50%;
            background: rgba(30, 59, 45, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(30, 59, 45, 0.1);
        }

        .stamp i {
            font-size: 0.9rem;
            color: var(--color-brand);
        }

        .stamp span {
            font-size: 0.55rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--color-text);
        }

        /* --- Fade Out Transition --- */
        body.fade-out {
            opacity: 0;
            transform: scale(1.02);
            filter: blur(4px);
            transition: opacity 0.8s ease, transform 0.8s ease, filter 0.8s ease;
        }

        /* =========================================
           RESPONSIVE PERFECTION (Proportional 20% Scaling)
           ========================================= */
        
        @media (max-width: 640px) {
            /* This smoothly shrinks EVERYTHING (fonts, paddings, margins, sizes) 
              by exactly 20% by changing the base rem size from 16px to 12.8px 
            */
            html {
                font-size: 12.8px; 
            }
            .boutique-card {
                width: 88%;
            }
        }

        /* Extra scaling for very small devices like iPhone SE/12 mini (375x812) */
        @media only screen and (max-width: 380px) {
            html {
                font-size: 12px; /* 25% smaller than original */
            }
            .boutique-card {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <!-- Dreamy Classical Background -->
    <div class="dream-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Main Classical Boutique Card -->
    <div class="boutique-card">
        
        <!-- Elegant Emblem -->
        <div class="brand-emblem">
            <i class="fa-solid fa-leaf"></i>
            <div class="emblem-ring"></div>
        </div>

        <!-- Classical Typography Identity -->
        <h1 class="brand-title">Sukh Healthcare</h1>
        <div class="brand-subtitle">Premium Wellness Boutique</div>

        <!-- Cinematic Loading Flow -->
        <div class="loading-wrapper">
            <div class="status-text" id="statusText">
                Curating your collection
            </div>
            <div class="progress-line-container">
                <div class="progress-line" id="progressBar"></div>
            </div>
        </div>

        <!-- Classical Trust Stamps -->
        <div class="trust-stamps">
            <div class="stamp">
                <div class="stamp-icon"><i class="fa-solid fa-seedling"></i></div>
                <span>Pure</span>
            </div>
            <div class="stamp">
                <div class="stamp-icon"><i class="fa-solid fa-certificate"></i></div>
                <span>Certified</span>
            </div>
            <div class="stamp">
                <div class="stamp-icon"><i class="fa-solid fa-bag-shopping"></i></div>
                <span>Secure</span>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // E-COMMERCE REDIRECT & CINEMATIC LOADING LOGIC
        // ==========================================
        
        const REDIRECT_URL = 'main.html';
        const SPLASH_DURATION = 5800; // 5.8 seconds

        // Boutique-style loading narrative
        const storeLoadingStates = [
            { percent: 0, text: "Curating your collection" },
            { percent: 25, text: "Preparing premium botanicals" },
            { percent: 55, text: "Securing your session" },
            { percent: 80, text: "Unveiling storefront" },
            { percent: 96, text: "Welcome to Sukh" }
        ];

        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        
        let startTime = null;
        let activeText = storeLoadingStates[0].text; // Bug fix: track currently displayed text

        function updateLoader(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = timestamp - startTime;
            
            let rawPercentage = Math.min((progress / SPLASH_DURATION) * 100, 100);
            
            // Elegant Ease-Out Quart formula for smooth, classical deceleration
            let easePercentage = 100 - Math.pow(1 - (rawPercentage / 100), 4) * 100;
            
            progressBar.style.width = `${easePercentage}%`;

            let targetText = storeLoadingStates[0].text;
            for (let i = storeLoadingStates.length - 1; i >= 0; i--) {
                if (easePercentage >= storeLoadingStates[i].percent) {
                    targetText = storeLoadingStates[i].text;
                    break;
                }
            }
            
            // Text change logic triggered only once per state change
            if (activeText !== targetText) {
                activeText = targetText; // Prevent multiple re-triggers in the loop
                
                // Elegant Dissolve-Out Effect
                statusText.style.transition = 'opacity 0.3s ease';
                statusText.style.opacity = '0';
                
                setTimeout(() => {
                    statusText.innerText = targetText;
                    
                    if(targetText === "Welcome to Sukh") {
                        statusText.style.color = "var(--color-brand)";
                    }
                    
                    // Elegant Dissolve-In Effect
                    statusText.style.transition = 'opacity 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)';
                    statusText.style.opacity = '1';
                }, 300); // 300ms delay to complete fade out
            }

            if (progress < SPLASH_DURATION) {
                requestAnimationFrame(updateLoader);
            } else {
                // Final completion state
                progressBar.style.width = "100%";
                
                // Dreamy Fade out & Redirect
                setTimeout(() => {
                    document.body.classList.add('fade-out');
                    setTimeout(() => {
                        window.location.replace(REDIRECT_URL);
                    }, 800);
                }, 500);
            }
        }

        // Start animation loop smoothly
        window.addEventListener('load', () => {
            setTimeout(() => {
                requestAnimationFrame(updateLoader);
            }, 150);
        });
        
        // Failsafe Redirect
        setTimeout(() => {
            if(!document.body.classList.contains('fade-out')) {
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.replace(REDIRECT_URL);
                }, 800);
            }
        }, SPLASH_DURATION + 2000); 

    </script>
</body>
</html>
